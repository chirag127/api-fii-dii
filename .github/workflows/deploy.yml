name: deploy

# Plain static GitHub Pages deploy — no external template.
# Builds dist/ from data/ + openapi.yaml + a generated index.html.

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "data/**"
      - "openapi.yaml"
      - "scripts/build-site.mjs"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build static site
        run: node scripts/build-site.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
