name: Daily FII Fetch

on:
  schedule:
    # 1:30 PM UTC is 7:00 PM IST
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

jobs:
  fetch_data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas matplotlib beautifulsoup4 lxml

    - name: Run fetch script
      run: python fetch_fii.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add fii_history.json money_flow.png
        git commit -m "Update FII/DII data and chart" || echo "No changes to commit"
        git push
